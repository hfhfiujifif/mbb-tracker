# Täglicher Lauf über GitHub Actions.
# SMTP-Daten (sobald von der IT bereitgestellt) als Repository-Secrets:
# SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS
name: Website-Tracker
on:
  schedule:
    - cron: "0 6 * * *"   # täglich 06:00 UTC = 08:00 MESZ
  workflow_dispatch: {}    # manueller Start möglich
permissions:
  contents: write
  issues: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyyaml
      - run: python tracker.py run
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
      # state.json, dashboard.html und index.html zurück ins Repository schreiben
      - run: |
          git config user.name "tracker-bot"
          git config user.email "tracker@users.noreply.github.com"
          git add state.json dashboard.html index.html
          git diff --cached --quiet || git commit -m "Tracker-Lauf $(date -u +%F)"
          git push
      # Bei Fehlschlag: automatisch ein Issue im Repository anlegen
      - name: Issue bei Fehlschlag
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Website-Tracker-Lauf fehlgeschlagen ($(date -u +%d.%m.%Y))" \
            --body "Der tägliche Lauf ist fehlgeschlagen. Protokoll: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --repo "${{ github.repository }}" || true
