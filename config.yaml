# ---------------------------------------------------------------------
# Finanzkalender-Termine (Quelle: https://www.mbb.com/ir/finanzkalender.html)
# Vor jedem Termin wird mit "vorlauf_tage" Vorlauf erinnert, den
# Kalender auf der Website und die zugehörigen Inhalte zu prüfen.
# Format: JJJJ-MM-TT
# ---------------------------------------------------------------------
kalender:
  - datum: 2026-08-13
    titel: "Halbjahresfinanzbericht 2026"
  - datum: 2026-11-12
    titel: "Quartalsmitteilung Q3 2026"
  - datum: 2026-12-31
    titel: "Geschäftsjahresende"
