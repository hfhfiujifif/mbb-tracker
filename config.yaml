# =====================================================================
# MBB Website-Tracker – Konfiguration
# =====================================================================
# Diese Datei ist die einzige Stelle, an der du laufend Änderungen
# vornimmst. Neue Prüfpunkte: einfach einen Block unter "checks"
# kopieren und anpassen. Neue Termine: unter "kalender" ergänzen.
#
# Intervalle: "quartalsweise" (90 Tage) oder "jaehrlich" (365 Tage)
# ---------------------------------------------------------------------

email:
  empfaenger: "office@example.com"        # E-Mail der Office-Managerin – ANPASSEN
  absender: "tracker@example.com"         # Absenderadresse – ANPASSEN
  betreff_prefix: "[Website-Check]"
  # SMTP-Zugangsdaten werden NICHT hier hinterlegt, sondern als
  # Umgebungsvariablen gesetzt: SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS

erinnerung:
  vorlauf_tage: 14      # so viele Tage vor Fälligkeit beginnt die Erinnerung

checks:
  # ---------- Die Aktie (quartalsweise) ----------
  - id: aktie-aktionaersstruktur
    titel: "Aktionärsstruktur"
    url: "https://www.mbb.com/ir/aktie.html"
    intervall: quartalsweise
    felder:
      - "Grundkapital: 5.436.169 €"
      - "Stückzahl: 5.436.169 nennwertlose Inhaberaktien"
      - "Anteil Gründer (Nesemeier / Freimuth): 71 %"

  - id: aktie-zahlen
    titel: "MBB in Zahlen / Streubesitz"
    url: "https://www.mbb.com/ir/aktie.html"
    intervall: quartalsweise
    felder:
      - "Kennzahlentabelle (Angaben in T€, Margen bezogen auf Betriebsleistung)"
      - "Streubesitz: 29 %"

  - id: aktie-analysten
    titel: "Analysten-Liste"
    url: "https://www.mbb.com/ir/aktie.html"
    intervall: quartalsweise
    felder:
      - "Berenberg – Gerhard Orgonas"
      - "ODDO BHF – Klaus Breitenbach"
      - "Quirin Bank – Ralf Marinoni"
      - "EQUI.TS – Thomas Schießle"
      - "Metzler – Dr. Victor Beyer"

  # ---------- Zahlenwerk (quartalsweise) ----------
  - id: zahlenwerk
    titel: "Zahlenwerk / Eckdaten & Entwicklungstabelle"
    url: "https://www.mbb.com/ueber-uns/zahlenwerk.html"
    intervall: quartalsweise
    felder:
      - "Aktienzahl: 5.436.169"
      - "Geschäftsführende Direktoren: Dr. Christof Nesemeier, Torben Teichler"
      - "Tabelle 'Entwicklung seit 1995': Umsatz (adj.), EBITDA (adj.), Mitarbeiter"

  # ---------- Töchter: MBB-Anteil (quartalsweise) ----------
  - id: aumann-anteil
    titel: "Aumann – MBB Anteil"
    url: "https://www.mbb.com/unsere-toechter/aumann.html"
    intervall: quartalsweise
    felder:
      - "MBB Anteil: 47,81 %"

  - id: vorwerk-anteil
    titel: "Friedrich Vorwerk – MBB Anteil"
    url: "https://www.mbb.com/unsere-toechter/friedrich-vorwerk.html"
    intervall: quartalsweise
    felder:
      - "MBB Anteil"

  - id: dts-anteil
    titel: "DTS IT – MBB Anteil"
    url: "https://www.mbb.com/unsere-toechter/dts-it.html"
    intervall: quartalsweise
    felder:
      - "MBB Anteil"

  - id: delignit-anteil
    titel: "Delignit – MBB Anteil"
    url: "https://www.mbb.com/unsere-toechter/delignit.html"
    intervall: quartalsweise
    felder:
      - "MBB Anteil"

  - id: hanke-anteil
    titel: "Hanke Tissue – MBB Anteil"
    url: "https://www.mbb.com/unsere-toechter/hanke-tissue.html"
    intervall: quartalsweise
    felder:
      - "MBB Anteil"

  - id: ct-anteil
    titel: "CT Formpolster – MBB Anteil"
    url: "https://www.mbb.com/unsere-toechter/ct-formpolster.html"
    intervall: quartalsweise
    felder:
      - "MBB Anteil"

  # ---------- Töchter: Stammdaten (jährlich) ----------
  - id: aumann-stammdaten
    titel: "Aumann – Stammdaten"
    url: "https://www.mbb.com/unsere-toechter/aumann.html"
    intervall: jaehrlich
    felder:
      - "Tätigkeit, Märkte, Standorte"
      - "Umsatz 2025: 204 Mio. €"
      - "Mitarbeiter 2025: 773"
