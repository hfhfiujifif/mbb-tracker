# ---------------------------------------------------------------------
# Finanzkalender (Quelle: https://www.mbb.com/ir/finanzkalender.html)
# Quartalsweise Prüfpunkte werden zum jeweils nächsten Termin fällig.
# Termine für 2027 nachtragen, sobald MBB sie veröffentlicht!
# Format: JJJJ-MM-TT
# ---------------------------------------------------------------------
kalender:
  - datum: 2026-08-13
    titel: "Halbjahresfinanzbericht 2026"
  - datum: 2026-11-12
    titel: "Quartalsmitteilung Q3 2026"
  - datum: 2026-12-31
    titel: "Geschäftsjahresende"
