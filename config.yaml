# =====================================================================
# MBB Website-Tracker – Konfiguration
# =====================================================================
# Diese Datei ist die einzige Stelle, an der du laufend Änderungen
# vornimmst. Neue Prüfpunkte: einen Block unter "checks" kopieren.
# Neue Termine: unter "kalender" ergänzen.
#
# Intervalle: "quartalsweise" (fällig zum nächsten Finanzkalender-
# Termin) oder "jaehrlich" (365 Tage)
#
# pruefwerte: Textstücke, die auf der Seite vorhanden sein MÜSSEN.
#   Der Crawler ruft die Seite ab und schlägt Alarm, wenn ein Wert
#   fehlt (= jemand hat die Seite geändert oder sie ist defekt).
# referenzen: Links zu externen Quellen für den MANUELLEN Vergleich.
#   Kein automatischer Abgleich – externe Portale rechnen anders
#   (z. B. Streubesitz) und verbieten automatisches Auslesen.
# ---------------------------------------------------------------------

email:
  empfaenger:                             # ein oder mehrere Empfänger
    - "mak@mbb.com"
    - "peb@mbb.com"
    - "tte@mbb.com"
  absender: "office@mbb.com"
  betreff_prefix: "[Website-Check]"
  # SMTP-Zugangsdaten als Umgebungsvariablen: SMTP_HOST, SMTP_PORT,
  # SMTP_USER, SMTP_PASS

# Gruppen für die optische Gliederung im Dashboard.
# "farbe" = Balken-/Trennerfarbe (Hex). Anpassbar, z. B. an die CI der Tochter.
gruppen:
  - name: "MBB"
    farbe: "#1a1a1a"
  - name: "Aumann"
    farbe: "#D60117"
  - name: "Vorwerk"
    farbe: "#004E9E"
  - name: "DTS IT"
    farbe: "#FFCC00"      # obere Hälfte
    farbe2: "#3C3C3C"     # untere Hälfte
  - name: "Delignit"
    farbe: "#4C8B2B"
  - name: "Hanke Tissue"
    farbe: "#2F277B"
  - name: "CT Formpolster"
    farbe: "#F37320"      # obere Hälfte
    farbe2: "#0A314D"     # untere Hälfte

# Meldungs-Wächter: überwacht EQS-Veröffentlichungen der MBB SE.
# Alarm bei neuen Meldungen, deren Kategorie (aus der EQS-URL) oder
# Titel-Stichwort passt. Abschalten: aktiv: false
news_waechter:
  aktiv: true
  quellen:
    - name: "EQS – MBB SE"
      url: "https://www.eqs-news.com/de/company/mbb-se/news/5b80158b-ea7c-11e8-902f-2c44fd856d8c"
  kategorien:
    - directors-dealings
    - stimmrechtsanteile
    - gesamtstimmrechte
    - ad-hoc
  stichwoerter:
    - "Nesemeier"
    - "Freimuth"
    - "Aktienrückkauf"
    - "Rückkaufprogramm"
    - "Aumann"
    - "Vorwerk"
    - "Delignit"
    - "DTS"
    - "Hanke"
    - "Formpolster"

# Anteils-Rechner: verrechnet neue Directors' Dealings der Gründer(-Holdings)
# mit dem Basis-Anteil von der Website zu einem kursiven VORSCHLAG.
# Nach Übernahme auf der Website: basis_prozent + basis_stand aktualisieren.
dd_rechner:
  aktiv: true
  basis_auto: true           # Basis wird automatisch von der Website gelesen
  basis_url: "https://www.mbb.com/ir/aktie.html"
  basis_prozent: 71.0        # nur Fallback, falls Auto-Auslesen fehlschlägt
  aktien_gesamt: 5436169
  personen:                  # Meldepflichtige, die zum Gründeranteil zählen
    - "MBB Capital Management"
    - "Nesemeier"
    - "Freimuth"
  berichte_url: "https://www.eqs-news.com/de/company/mbb-se/berichte/5b80158b-ea7c-11e8-902f-2c44fd856d8c"

erinnerung:
  vorlauf_tage: 14      # so viele Tage vor Fälligkeit beginnt die Erinnerung

website_abgleich:
  aktiv: true           # false = mbb.com-Crawler abschalten (Rückbau-Schalter)

extern_abgleich:
  aktiv: true           # false = externen Abgleich (MarketScreener) abschalten

checks:
  # ---------- Die Aktie (quartalsweise) ----------
  - id: aktie-aktionaersstruktur
    titel: "Aktionärsstruktur"
    url: "https://www.mbb.com/ir/aktie.html"
    intervall: quartalsweise
    fundstelle: "Abschnitt 'Aktionärsstruktur' – Textblock im unteren Seitenbereich"
    felder:
      - "Grundkapital: 5.436.169 €"
      - "Stückzahl: 5.436.169 nennwertlose Inhaberaktien"
      - "Anteil Gründer (Nesemeier / Freimuth): 71 %"
    pruefwerte:
      - "5.436.169"
      - "71 %"
    referenzen:
      - titel: "MarketScreener (Aktionäre)"
        url: "https://www.marketscreener.com/quote/stock/MBB-SE-184899201/company-shareholders/"
      - titel: "Bundesanzeiger (Stimmrechtsmitteilungen)"
        url: "https://www.bundesanzeiger.de"

  - id: aktie-zahlen
    titel: "MBB in Zahlen / Streubesitz"
    url: "https://www.mbb.com/ir/aktie.html"
    intervall: quartalsweise
    fundstelle: "Tabelle 'MBB in Zahlen' inkl. Zeile 'Streubesitz'"
    felder:
      - "Kennzahlentabelle (Angaben in T€, Margen bezogen auf Betriebsleistung)"
      - "Streubesitz: 29 %"
    pruefwerte:
      - "Streubesitz"
      - "29 %"
    referenzen:
      - titel: "MarketScreener (Free Float, andere Methodik)"
        url: "https://www.marketscreener.com/quote/stock/MBB-SE-184899201/company-shareholders/"

  - id: aktie-analysten
    titel: "Analysten-Liste"
    url: "https://www.mbb.com/ir/aktie.html"
    intervall: quartalsweise
    fundstelle: "Abschnitt 'Analysten' – Tabelle Bank/Ansprechpartner"
    felder:
      - "Berenberg: Gerhard Orgonas"
      - "ODDO BHF: Klaus Breitenbach"
      - "Quirin Bank: Ralf Marinoni"
      - "EQUI.TS: Thomas Schießle"
      - "Metzler: Dr. Victor Beyer"
    pruefwerte:
      - "Orgonas"
      - "Breitenbach"
      - "Marinoni"
      - "Schießle"
      - "Beyer"

  - id: aktie-dividendenpolitik
    titel: "Dividendenpolitik"
    url: "https://www.mbb.com/ir/aktie.html"
    intervall: quartalsweise
    fundstelle: "Abschnitt 'Dividendenpolitik' – Textblock und Grafik 'Dividendenzahlungen je Aktie'"
    felder:
      - "Basisdividende 2026: 1,21 €/Aktie (16. Erhöhung in Folge)"
      - "Ausschüttungen seit IPO: über 200 Mio. €"
      - "Grafik: Dividendenzahlungen je Aktie bis 2026, 10x Share buy-back"
    pruefwerte:
      - "Dividendenpolitik"
      - "16. in Folge"
      - "200 Mio. €"
    # Prüft den Quellcode: Ist noch die 2026er-Dividendengrafik eingebunden?
    # Nach der HV 2027 muss hier der neue Pfad (.../2027/...) eingetragen werden,
    # sonst meldet der Tracker die veraltete Grafik – das ist gewollt.
    pruefwerte_roh:
      - "hauptversammlung/2026/260702-MAG-DividendeDE.png"
    # Texte, die ab einem Datum NICHT mehr auf der Seite stehen dürfen
    # (z. B. "e"-Kennzeichnung/Vorbehalt nach der Hauptversammlung).
    # Beispiel – aktivieren, sobald der konkrete Wortlaut bekannt ist:
    # verboten:
    #   - wert: "vorbehaltlich der Zustimmung der Hauptversammlung"
    #     ab: 2027-06-01

  # ---------- Zahlenwerk (quartalsweise) ----------
  - id: zahlenwerk
    titel: "Zahlenwerk / Eckdaten & Entwicklungstabelle"
    url: "https://www.mbb.com/ueber-uns/zahlenwerk.html"
    intervall: quartalsweise
    fundstelle: "Kasten 'Unsere Eckdaten' und Tabelle 'Unsere Entwicklung seit 1995'"
    felder:
      - "Aktienzahl: 5.436.169"
      - "Direktoren: Dr. Christof Nesemeier, Torben Teichler"
      - "Tabelle: Umsatz (adj.), EBITDA (adj.), Mitarbeiter seit 1995"
    pruefwerte:
